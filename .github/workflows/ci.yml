name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check server.js

  secret-scan:
    name: Secret leak guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for known private tokens (best-effort)
        run: |
          set -e
          patterns='sk-ant-|sk-[A-Za-z0-9]{20,}|AIza[0-9A-Za-z_-]{35}|ghp_[A-Za-z0-9]{36}|xox[abp]-[A-Za-z0-9-]+|BEGIN RSA PRIVATE KEY|BEGIN OPENSSH PRIVATE KEY'
          if grep -RInE "$patterns" --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.github --exclude-dir=keys --exclude-dir=logs . ; then
            echo "::error::Possible secret found in the repo"
            exit 1
          fi
          echo "No secret-shaped strings found."

  no-deps-guard:
    name: Zero-dependency invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure package.json has no runtime dependencies
        run: |
          set -e
          deps=$(node -e 'const p = require("./package.json"); console.log(Object.keys(p.dependencies || {}).length)')
          if [ "$deps" != "0" ]; then
            echo "::error::This project must stay zero-dependency. Found $deps runtime deps — open an issue to discuss."
            exit 1
          fi
          echo "Zero runtime deps confirmed."

  docker-validate:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
