name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_LITE_PAT }}
        with:
          path-to-signatures: 'consciousness-key-server/cla.json'
          path-to-document: 'https://github.com/build-on-ai/consciousness-key-server/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'tmaloziec,bot*,dependabot[bot]'
          remote-organization-name: 'build-on-ai'
          remote-repository-name: 'cla-signatures'
          custom-notsigned-prcomment: 'Thanks for opening a pull request! Before we can merge, please sign the [Consciousness Key Server CLA](https://github.com/build-on-ai/consciousness-key-server/blob/main/CLA.md) by posting the following comment on this PR:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'CLA signed by all contributors. Thank you!'
          lock-pullrequest-aftermerge: false
